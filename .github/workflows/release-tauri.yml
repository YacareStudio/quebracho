name: Release Tauri

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag del release a publicar, por ejemplo v0.0.1-alpha3"
        required: true
        default: "v0.0.1-alpha3"
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: "--bundles nsis"
          - platform: "ubuntu-22.04"
            args: "--bundles appimage,deb,rpm"
          - platform: "macos-latest"
            args: "--bundles app,dmg"
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install

      - name: Validate release metadata
        run: node scripts/validate-release-metadata.mjs "${{ env.RELEASE_TAG }}"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Quebracho ${{ env.RELEASE_TAG }}"
          releaseBody: "Release automatizado de Quebracho."
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          args: ${{ matrix.args }}
