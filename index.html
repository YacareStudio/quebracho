<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quebracho</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #323643; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #323643; }
      ::-webkit-scrollbar-thumb { background: #4a4f5e; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #5a5f6e; }
      ::-webkit-scrollbar-corner { background: #323643; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
